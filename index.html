<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS 웹 서비스 실습 완료</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #ff9900; /* AWS 오렌지 */
            --secondary-color: #232f3e; /* AWS 다크 블루 */
            --background-color: #f4f7f6; /* 밝은 회색 배경 */
            --text-color: #333; /* 기본 텍스트 색 */
            --white: #fff; /* 흰색 */
        }

        body {
            font-family: 'Noto Sans KR', sans-serif; /* 한국어 최적화 폰트 */
            margin: 0;
            background-color: var(--background-color);
            color: var(--text-color);
            line-height: 1.6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh; /* 화면 꽉 차게 */
        }

        /* 메인 컨테이너 */
        .container {
            text-align: center;
            background-color: var(--white);
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            animation: fadeInUp 1s ease-out; /* 페이드인 애니메이션 */
        }

        /* AWS 로고 이미지 스타일 */
        .logo {
            width: 150px; /* 이미지 크기 조절 */
            margin-bottom: 30px;
            animation: fadeInDown 1s ease-out; /* 페이드인 애니메이션 */
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            color: var(--secondary-color);
            margin-bottom: 20px;
        }

        p {
            font-size: 1.3rem;
            font-weight: 300;
            color: var(--text-color);
            margin-bottom: 40px;
        }
